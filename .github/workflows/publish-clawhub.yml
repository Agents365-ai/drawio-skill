name: Publish to ClawHub

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'scripts/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Authenticate with GitHub token
        run: clawhub auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Publish skill
        run: clawhub skill publish .
