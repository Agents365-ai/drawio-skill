name: Publish to ClawHub

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'scripts/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Authenticate with ClawHub
        run: |
          mkdir -p "$HOME/.config/clawhub"
          echo '{"registry":"https://clawhub.ai","token":"'"${{ secrets.CLAWHUB_TOKEN }}"'"}' > "$HOME/.config/clawhub/config.json"

      - name: Get version from metadata
        id: version
        run: |
          VERSION=$(grep -o '"version":"[^"]*"' SKILL.md | head -1 | cut -d'"' -f4)
          echo "version=${VERSION:-1.0.0}" >> "$GITHUB_OUTPUT"

      - name: Publish skill
        run: clawhub publish . --version "${{ steps.version.outputs.version }}"
